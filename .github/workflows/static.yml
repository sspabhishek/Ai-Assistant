# Simple workflow for deploying static content to GitHub Pages
# This workflow automates the process of pushing your code to the 'github-pages' environment.
name: Deploy static content to Pages

on:
  # Triggers the workflow when code is pushed to the 'main' branch
  push:
    branches: ["main"]

  # Allows you to manually trigger this workflow from the Actions tab on GitHub
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read      # Allows the job to read the repository content
  pages: write         # Required for pushing content to GitHub Pages
  id-token: write      # Required for authentication with OIDC

# Ensures only one deployment runs at a time to prevent conflicts
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 'deploy' job: This handles the checkout, artifact upload, and final deployment
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # Step 1: Download the repository code onto the runner
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Configure the runner to support GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Step 3: Bundle and upload the files as a deployment artifact
      # Here, we specify '.' to upload the entire root directory
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # Step 4: Final step to push the uploaded artifact to the live GitHub Pages site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
