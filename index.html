<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg-color: #212121;
            --sidebar-bg: #171717;
            --input-bg: #2f2f2f;
            --text-color: #ececec;
            --text-muted: #b4b4b4;
            --border-color: rgba(255, 255, 255, 0.1);
            --user-msg-bg: #2f2f2f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 10px;
            border-right: 1px solid var(--border-color);
        }

        .new-chat-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .sidebar-bottom {
            margin-top: auto;
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
        }

        .settings-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background-color: transparent;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            width: 100%;
            transition: background 0.2s;
        }

        .settings-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Main Chat Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            scroll-behavior: smooth;
        }

        .message-row {
            display: flex;
            justify-content: center;
            padding: 20px 20px;
            width: 100%;
        }

        .message-content {
            max-width: 800px;
            width: 100%;
            display: flex;
            gap: 20px;
            font-size: 16px;
            line-height: 1.6;
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .user-avatar {
            background-color: #5436DA;
        }

        .ai-avatar {
            background-color: #10a37f;
        }

        .message-text {
            flex: 1;
            overflow-wrap: break-word;
            color: #d1d5db;
        }

        /* Markdown Styles */
        .message-text p {
            margin-bottom: 1rem;
        }

        .message-text p:last-child {
            margin-bottom: 0;
        }

        .message-text pre {
            background: #0d0d0d;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1rem 0;
        }

        .message-text code {
            font-family: 'Consolas', monospace;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .message-text pre code {
            background: transparent;
            padding: 0;
        }

        .message-text ul,
        .message-text ol {
            margin-left: 2rem;
            margin-bottom: 1rem;
        }

        /* Input Area */
        .input-container {
            padding: 20px;
            max-width: 840px;
            margin: 0 auto;
            width: 100%;
        }

        .input-box {
            background-color: var(--input-bg);
            border-radius: 15px;
            padding: 12px 16px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
        }

        .input-box textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            resize: none;
            max-height: 200px;
            min-height: 24px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            outline: none;
            line-height: 1.5;
            padding: 0;
            overflow-y: auto;
        }

        .send-btn {
            background-color: white;
            color: black;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            opacity: 0.8;
        }

        .send-btn:disabled {
            background-color: #666;
            cursor: not-allowed;
        }

        /* Modal Settings */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
        }

        .modal-content h3 {
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .modal-input {
            width: 100%;
            padding: 10px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            margin-bottom: 1.5rem;
            outline: none;
            font-family: inherit;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            border: none;
        }

        .btn-primary {
            background: white;
            color: black;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border-color);
            color: white;
        }

        .mobile-header {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            background-color: var(--sidebar-bg);
            border-bottom: 1px solid var(--border-color);
            color: white;
            font-size: 16px;
        }

        .menu-btn, .mobile-new-chat-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 5px;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        @media (max-width: 768px) {
            .mobile-header {
                display: flex;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: -260px;
                height: 100vh;
                z-index: 20;
                transition: left 0.3s ease;
            }

            .sidebar.active {
                left: 0;
            }

            .sidebar-overlay.active {
                display: block;
            }

            .message-row {
                padding: 15px 10px;
            }

            .input-container {
                padding: 10px;
            }
            
            .message-content {
                gap: 15px;
                font-size: 15px;
            }
        }
    </style>
</head>

<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="sidebar" id="sidebar">
        <button class="new-chat-btn" id="newChatBtn">
            <i class="fas fa-plus"></i> New chat
        </button>
        <div class="sidebar-bottom">
            <button class="settings-btn" id="settingsBtn">
                <i class="fas fa-cog"></i> API Settings
            </button>
        </div>
    </div>

    <div class="main-content">
        <div class="mobile-header">
            <button class="menu-btn" id="menuBtn">
                <i class="fas fa-bars"></i>
            </button>
            <span class="mobile-title">AI Assistant</span>
            <button class="mobile-new-chat-btn" id="mobileNewChatBtn">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <div class="chat-container" id="chatContainer">
            <!-- Messages container -->
        </div>

        <div class="input-container">
            <div class="input-box">
                <textarea id="userInput" placeholder="Message AI Assistant..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn">
                    <i class="fas fa-arrow-up"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h3>API Configuration</h3>
            <p style="margin-bottom: 15px; font-size: 14px; color: var(--text-muted);">Enter your Google Gemini API Key.
            </p>
            <input type="password" id="apiKeyInput" placeholder="API Key" class="modal-input">
            <div class="modal-actions">
                <button id="closeModal" class="modal-btn btn-secondary">Cancel</button>
                <button id="saveSettings" class="modal-btn btn-primary">Save</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";
        import { marked } from "https://esm.run/marked";

        const DOM = {
            chatContainer: document.getElementById('chatContainer'),
            userInput: document.getElementById('userInput'),
            sendBtn: document.getElementById('sendBtn'),
            settingsBtn: document.getElementById('settingsBtn'),
            newChatBtn: document.getElementById('newChatBtn'),
            settingsModal: document.getElementById('settingsModal'),
            closeModal: document.getElementById('closeModal'),
            saveSettings: document.getElementById('saveSettings'),
            apiKeyInput: document.getElementById('apiKeyInput'),
            sidebar: document.getElementById('sidebar'),
            sidebarOverlay: document.getElementById('sidebarOverlay'),
            menuBtn: document.getElementById('menuBtn'),
            mobileNewChatBtn: document.getElementById('mobileNewChatBtn')
        };

        let GEMINI_API_KEY = localStorage.getItem('GEMINI_API_KEY') || '';
        let genAI = null;
        let model = null;
        let chat = null;
        let isGenerating = false;

        function initGemini() {
            if (!GEMINI_API_KEY) return false;
            try {
                genAI = new GoogleGenerativeAI(GEMINI_API_KEY);
                model = genAI.getGenerativeModel({
                    model: "gemini-3-flash-preview"
                });
                return true;
            } catch (err) {
                console.error(err);
                return false;
            }
        }

        function startNewChat() {
            if (!model) return;
            chat = model.startChat({ history: [] });
            DOM.chatContainer.innerHTML = '';
            addMessage('Hello! How can I help you today?', false);
        }

        function addMessage(text, isUser = false) {
            const row = document.createElement('div');
            row.className = 'message-row';

            const content = document.createElement('div');
            content.className = 'message-content';

            const avatar = document.createElement('div');
            avatar.className = `avatar ${isUser ? 'user-avatar' : 'ai-avatar'}`;
            avatar.innerHTML = isUser ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';

            const msgText = document.createElement('div');
            msgText.className = 'message-text';

            if (isUser) {
                msgText.textContent = text;
            } else {
                msgText.innerHTML = marked.parse(text);
            }

            content.appendChild(avatar);
            content.appendChild(msgText);
            row.appendChild(content);
            DOM.chatContainer.appendChild(row);

            DOM.chatContainer.scrollTop = DOM.chatContainer.scrollHeight;
        }

        async function handleSend() {
            const text = DOM.userInput.value.trim();
            if (!text || isGenerating) return;

            if (!GEMINI_API_KEY) {
                DOM.settingsModal.style.display = 'flex';
                return;
            }

            DOM.userInput.value = '';
            DOM.userInput.style.height = 'auto'; // Reset height
            addMessage(text, true);
            isGenerating = true;
            DOM.sendBtn.disabled = true;

            const loadingId = 'loading-' + Date.now();
            const row = document.createElement('div');
            row.className = 'message-row';
            row.id = loadingId;
            row.innerHTML = `
                <div class="message-content">
                    <div class="avatar ai-avatar"><i class="fas fa-robot"></i></div>
                    <div class="message-text">...</div>
                </div>
            `;
            DOM.chatContainer.appendChild(row);
            DOM.chatContainer.scrollTop = DOM.chatContainer.scrollHeight;

            try {
                if (!chat) {
                    initGemini();
                    startNewChat();
                }
                const result = await chat.sendMessage(text);
                const response = result.response.text();

                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();

                addMessage(response, false);
            } catch (error) {
                console.error("Gemini API Error:", error);
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();

                // Show actual error message if available
                let errorMsg = "Sorry, I encountered an error. Please check your API key and connection.";
                if (error.message) {
                    errorMsg += "\n\nError details: " + error.message;
                }
                addMessage(errorMsg, false);
            } finally {
                isGenerating = false;
                DOM.sendBtn.disabled = false;
            }
        }

        DOM.userInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if (this.scrollHeight > 200) {
                this.style.overflowY = 'auto';
            } else {
                this.style.overflowY = 'hidden';
            }
        });

        DOM.userInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        DOM.sendBtn.addEventListener('click', handleSend);

        DOM.settingsBtn.addEventListener('click', () => {
            DOM.apiKeyInput.value = GEMINI_API_KEY;
            DOM.settingsModal.style.display = 'flex';
        });

        DOM.closeModal.addEventListener('click', () => {
            DOM.settingsModal.style.display = 'none';
        });

        DOM.saveSettings.addEventListener('click', () => {
            GEMINI_API_KEY = DOM.apiKeyInput.value.trim();
            localStorage.setItem('GEMINI_API_KEY', GEMINI_API_KEY);
            DOM.settingsModal.style.display = 'none';
            if (initGemini()) {
                if (DOM.chatContainer.children.length === 0) {
                    startNewChat();
                }
            }
        });

        DOM.newChatBtn.addEventListener('click', () => {
            startNewChat();
            if (window.innerWidth <= 768) toggleSidebar();
        });

        DOM.mobileNewChatBtn.addEventListener('click', startNewChat);

        function toggleSidebar() {
            DOM.sidebar.classList.toggle('active');
            DOM.sidebarOverlay.classList.toggle('active');
        }

        DOM.menuBtn.addEventListener('click', toggleSidebar);
        DOM.sidebarOverlay.addEventListener('click', toggleSidebar);

        DOM.settingsBtn.addEventListener('click', () => {
            if (window.innerWidth <= 768) toggleSidebar();
        });

        // Initialization
        if (initGemini()) {
            startNewChat();
        } else {
            addMessage("Please configure your Gemini API Key in settings to start.", false);
        }
    </script>
</body>

</html>
